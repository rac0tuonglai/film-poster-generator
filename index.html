<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Film Poster Generator</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <h1>Film Poster Generator</h1>
        <p>
            Search for your favourite movie
        </p>
        <input
            type="text"
            id="movieInput"
            placeholder="Enter movie name">
        <button id="searchBtn">
            Search
        </button>
        <div id="suggestions"></div>
        <div id="results"></div>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
