<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Poster</title>
    <link rel="stylesheet" href="css/poster.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="poster">
        <img
            id="moviePoster"
            src=""
            alt="Movie Poster">
        <div class="title-row">
            <h1 id="movieTitle">
                MOVIE TITLE
            </h1>
        </div>

        <div class="info-row">
            <span class="label">
                running time
            </span>
            <span
                class="value"
                id="movieRuntime">
                120 MINUTES
            </span>
        </div>

        <div class="info-row">
            <span class="label">
                directed by
            </span>
            <span
                class="value"
                id="movieDirector">
                DIRECTOR
            </span>
        </div>

        <div class="info-row">
            <span class="label">
                genre
            </span>

            <span
                class="value"
                id="movieGenre">
                ACTION • DRAMA
            </span>

        </div>
        <div class="info-row cast-row">
            <span class="label">
                starring
            </span>

            <span
                class="value"
                id="movieActors">
            </span>
        </div>
    </div>
</body>
<script src="js/poster.js"></script>
</html>
